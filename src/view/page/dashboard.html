<script>
    defineComponent('page-dashboard', {
        template: '#page-dashboard',
        props: {},

            // 模拟订单数据
            const orders = ref([
                { id: 'ORD-20240301', user: '张三', product: 'Premium 套餐', amount: 299, status: 'paid', time: '2024-03-01 14:30:25' },
                { id: 'ORD-20240302', user: '李四', product: '基础套餐', amount: 99, status: 'paid', time: '2024-03-01 13:45:12' },
                { id: 'ORD-20240303', user: '王五', product: '企业套餐', amount: 999, status: 'pending', time: '2024-03-01 12:20:05' },
                { id: 'ORD-20240304', user: '赵六', product: 'Premium 套餐', amount: 299, status: 'shipped', time: '2024-03-01 11:15:33' },
                { id: 'ORD-20240305', user: '钱七', product: '基础套餐', amount: 99, status: 'completed', time: '2024-03-01 10:05:18' },
            ])

            const getStatusType = (status) => {
                const map = {
                    paid: 'success',
                    pending: 'warning',
                    shipped: 'info',
                    completed: 'success',
                    cancelled: 'danger'
                }
                return map[status] || 'info'
            }

            const getStatusText = (status) => {
                const map = {
                    paid: '已支付',
                    pending: '待支付',
                    shipped: '已发货',
                    completed: '已完成',
                    cancelled: '已取消'
                }
                return map[status] || status
            }

            return {
                salesPeriod,
                orders,
                getStatusType,
                getStatusText
            }
        }
    })
</script>
