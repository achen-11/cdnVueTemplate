<template id="page-users-list">
    <div class="page-users-list">
        <!-- 页面标题 -->
        <div class="page-header">
            <div class="page-title">
                <h1>用户列表</h1>
                <p class="page-subtitle">管理系统用户账号</p>
            </div>
            <div class="page-actions">
                <el-button type="primary" @click="handleAdd">
                    <el-icon><plus></plus></el-icon>
                    新增用户
                </el-button>
            </div>
        </div>

        <!-- 搜索筛选 -->
        <div class="filter-card">
            <el-form :inline="true" :model="filters" class="filter-form">
                <el-form-item label="关键词">
                    <el-input v-model="filters.keyword" placeholder="搜索用户名/邮箱/手机" clearable="" style="width: 200px">
                        <template #prefix="">
                            <el-icon><search></search></el-icon>
                        </template>
                    </el-input>
                </el-form-item>
                <el-form-item label="状态">
                    <el-select v-model="filters.status" placeholder="全部" clearable="" style="width: 120px">
                        <el-option label="全部" value="">
                        <el-option label="启用" value="active">
                        <el-option label="禁用" value="inactive">
                    </el-option></el-option></el-option></el-select>
                </el-form-item>
                <el-form-item label="角色">
                    <el-select v-model="filters.role" placeholder="全部" clearable="" style="width: 120px">
                        <el-option label="全部" value="">
                        <el-option label="管理员" value="admin">
                        <el-option label="普通用户" value="user">
                    </el-option></el-option></el-option></el-select>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="handleSearch">
                        <el-icon><search></search></el-icon>
                        搜索
                    </el-button>
                    <el-button @click="handleReset">重置</el-button>
                </el-form-item>
            </el-form>
        </div>

        <!-- 用户表格 -->
        <div class="table-card">
            <el-table :data="users" stripe="" v-loading="loading" style="width: 100%">
                <el-table-column prop="avatar" label="头像" width="80">
                    <template #default="{ row }">
                        <el-avatar :size="40" :src="row.avatar">
                        </el-avatar>
                    </template>
                </el-table-column>
                <el-table-column prop="username" label="用户名" min-width="120"></el-table-column>
                <el-table-column prop="email" label="邮箱" min-width="180"></el-table-column>
                <el-table-column prop="phone" label="手机号" width="130"></el-table-column>
                <el-table-column prop="role" label="角色" width="100">
                    <template #default="{ row }">
                        <el-tag :type="row.role === 'admin' ? 'danger' : 'info'" size="small">
                            {{ row.role === 'admin' ? '管理员' : '普通用户' }}
                        </el-tag>
                    </template>
                </el-table-column>
                <el-table-column prop="status" label="状态" width="80">
                    <template #default="{ row }">
                        <el-switch v-model="row.status" active-value="active" inactive-value="inactive" @change="handleStatusChange(row)">
                        </el-switch>
                    </template>
                </el-table-column>
                <el-table-column prop="createdAt" label="注册时间" width="180"></el-table-column>
                <el-table-column label="操作" width="180" fixed="right">
                    <template #default="{ row }">
                        <el-button link="" type="primary" size="small" @click="handleEdit(row)">编辑</el-button>
                        <el-button link="" type="primary" size="small" @click="handleView(row)">查看</el-button>
                        <el-button link="" type="danger" size="small" @click="handleDelete(row)">删除</el-button>
                    </template>
                </el-table-column>
            </el-table>

            <!-- 分页 -->
            <div class="pagination-wrapper">
                <el-pagination v-model:current-page="pagination.page" v-model:page-size="pagination.pageSize" :page-sizes="[10, 20, 50, 100]" :total="pagination.total" layout="total, sizes, prev, pager, next, jumper" @size-change="handleSizeChange" @current-change="handlePageChange">
                </el-pagination>
            </div>
        </div>

        <!-- 用户表单对话框 -->
        <el-dialog v-model="dialogVisible" :title="dialogTitle" width="500px" destroy-on-close="">
            <el-form ref="formRef" :model="form" :rules="formRules" label-width="80px">
                <el-form-item label="用户名" prop="username">
                    <el-input v-model="form.username" placeholder="请输入用户名"></el-input>
                </el-form-item>
                <el-form-item label="邮箱" prop="email">
                    <el-input v-model="form.email" placeholder="请输入邮箱"></el-input>
                </el-form-item>
                <el-form-item label="手机号" prop="phone">
                    <el-input v-model="form.phone" placeholder="请输入手机号"></el-input>
                </el-form-item>
                <el-form-item label="角色" prop="role">
                    <el-select v-model="form.role" style="width: 100%">
                        <el-option label="管理员" value="admin"></el-option>
                        <el-option label="普通用户" value="user"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="状态" prop="status">
                    <el-radio-group v-model="form.status">
                        <el-radio label="active">启用</el-radio>
                        <el-radio label="inactive">禁用</el-radio>
                    </el-radio-group>
                </el-form-item>
            </el-form>
            <template #footer="">
                <el-button @click="dialogVisible = false">取消</el-button>
                <el-button type="primary" @click="handleSubmit" :loading="submitLoading">确定</el-button>
            </template>
        </el-dialog>
    </div>
</template>

<script>
    defineComponent('page-users-list', {
        template: '#page-users-list',
        props: {},
        emit: [],
        setup() {
            const loading = ref(false)
            const submitLoading = ref(false)
            const dialogVisible = ref(false)
            const dialogTitle = ref('')
            const formRef = ref(null)

            const filters = reactive({
                keyword: '',
                status: '',
                role: ''
            })

            const pagination = reactive({
                page: 1,
                pageSize: 10,
                total: 0
            })

            const form = reactive({
                id: '',
                username: '',
                email: '',
                phone: '',
                role: 'user',
                status: 'active'
            })

            const formRules = {
                username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                email: [
                    { required: true, message: '请输入邮箱', trigger: 'blur' },
                    { type: 'email', message: '请输入正确的邮箱格式', trigger: 'blur' }
                ],
                phone: [{ required: true, message: '请输入手机号', trigger: 'blur' }],
                role: [{ required: true, message: '请选择角色', trigger: 'change' }]
            }

            // 模拟数据
            const users = ref([
                { id: 1, username: 'admin', email: 'admin@example.com', phone: '13800138000', role: 'admin', status: 'active', avatar: 'https://cube.elemecdn.com/3/7c/3ea6beec64369c2642b92c6726f1epng.png', createdAt: '2024-01-15 10:30:00' },
                { id: 2, username: 'zhangsan', email: 'zhangsan@example.com', phone: '13800138001', role: 'user', status: 'active', avatar: 'https://cube.elemecdn.com/9/c2/f0ee8a3c7c9638a54940382568c9dpng.png', createdAt: '2024-02-01 14:20:00' },
                { id: 3, username: 'lisi', email: 'lisi@example.com', phone: '13800138002', role: 'user', status: 'inactive', avatar: 'https://cube.elemecdn.com/e/fd/0b6f864f5c3b1f8f5d1f0c0b3c3epng.png', createdAt: '2024-02-10 09:15:00' },
                { id: 4, username: 'wangwu', email: 'wangwu@example.com', phone: '13800138003', role: 'user', status: 'active', avatar: 'https://cube.elemecdn.com/3/7c/3ea6beec64369c2642b92c6726f1epng.png', createdAt: '2024-02-15 16:45:00' },
                { id: 5, username: 'zhaoliu', email: 'zhaoliu@example.com', phone: '13800138004', role: 'user', status: 'active', avatar: 'https://cube.elemecdn.com/9/c2/f0ee8a3c7c9638a54940382568c9dpng.png', createdAt: '2024-02-20 11:30:00' },
            ])

            pagination.total = users.value.length

            const handleSearch = () => {
                loading.value = true
                setTimeout(() => {
                    loading.value = false
                    ElMessage.success('搜索成功')
                }, 500)
            }

            const handleReset = () => {
                filters.keyword = ''
                filters.status = ''
                filters.role = ''
                handleSearch()
            }

            const handleAdd = () => {
                dialogTitle.value = '新增用户'
                form.id = ''
                form.username = ''
                form.email = ''
                form.phone = ''
                form.role = 'user'
                form.status = 'active'
                dialogVisible.value = true
            }

            const handleEdit = (row) => {
                dialogTitle.value = '编辑用户'
                Object.assign(form, row)
                dialogVisible.value = true
            }

            const handleView = (row) => {
                ElMessage.info('查看用户: ' + row.username)
            }

            const handleDelete = (row) => {
                ElMessageBox.confirm(`确定要删除用户 ${row.username} 吗？`, '提示', {
                    confirmButtonText: '确定',
                    cancelButtonText: '取消',
                    type: 'warning'
                }).then(() => {
                    ElMessage.success('删除成功')
                }).catch(() => {})
            }

            const handleStatusChange = (row) => {
                ElMessage.success(`用户 ${row.username} 已${row.status === 'active' ? '启用' : '禁用'}`)
            }

            const handleSubmit = async () => {
                if (!formRef.value) return
                await formRef.value.validate((valid) => {
                    if (valid) {
                        submitLoading.value = true
                        setTimeout(() => {
                            submitLoading.value = false
                            dialogVisible.value = false
                            ElMessage.success(dialogTitle.value === '新增用户' ? '添加成功' : '更新成功')
                        }, 500)
                    }
                })
            }

            const handleSizeChange = (val) => {
                pagination.pageSize = val
                handleSearch()
            }

            const handlePageChange = (val) => {
                pagination.page = val
                handleSearch()
            }

            return {
                loading,
                submitLoading,
                dialogVisible,
                dialogTitle,
                formRef,
                filters,
                pagination,
                form,
                formRules,
                users,
                handleSearch,
                handleReset,
                handleAdd,
                handleEdit,
                handleView,
                handleDelete,
                handleStatusChange,
                handleSubmit,
                handleSizeChange,
                handlePageChange
            }
        }
    })
</script>

<style>
.page-users-list {
    max-width: 1400px;
}

.page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--spacing-lg);
}

.page-title h1 {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--color-gray-900);
    margin: 0;
}

.page-subtitle {
    font-size: 0.875rem;
    color: var(--color-gray-500);
    margin: 4px 0 0 0;
}

.filter-card {
    background: var(--color-white);
    border-radius: var(--radius-lg);
    padding: var(--spacing-lg);
    margin-bottom: var(--spacing-lg);
    box-shadow: var(--shadow-sm);
}

.filter-form {
    margin: 0;
}

.table-card {
    background: var(--color-white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
}

.pagination-wrapper {
    display: flex;
    justify-content: flex-end;
    padding: var(--spacing-lg);
    border-top: 1px solid var(--color-gray-100);
}
</style>
